<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seni Seviyorum 💕</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* CSS AYARLARI AYNI KALIYOR */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            transition: background-color 2s ease-in-out;
            background-color: #ffeef8;
        }
        .hearts-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .heart { position: absolute; font-size: 25px; animation: floatUp 6s linear forwards; }
        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
        .header {
            position: relative; z-index: 2; text-align: center; margin: 20px 0 40px; padding: 30px;
            background: rgba(255, 255, 255, 0.95); border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 90%; max-width: 800px;
        }
        .header h1 { font-family: 'Dancing Script', cursive; font-size: 3.5rem; color: #d63384; }
        #dynamic-text { font-size: 1.2rem; color: #c2185b; font-style: italic; height: 30px; transition: opacity 0.5s; }
        .slider-container { width: 100vw; overflow: hidden; position: relative; z-index: 2; padding: 20px 0; }
        .gallery-slider { display: flex; width: max-content; animation: scroll 40s linear infinite; }
        .slider-container:hover .gallery-slider { animation-play-state: paused; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .photo-card { background: #ffffff; border-radius: 20px; padding: 15px; margin: 0 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); width: 300px; cursor: pointer; flex-shrink: 0; }
        .photo-wrapper { width: 100%; height: 350px; border-radius: 15px; overflow: hidden; margin-bottom: 10px; }
        .photo-img { width: 100%; height: 100%; object-fit: cover; }
        .photo-caption { text-align: center; color: #c2185b; font-weight: 600; }
        .music-container { margin-top: 30px; z-index: 2; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .lightbox img { max-width: 90%; max-height: 80%; border: 5px solid white; border-radius: 10px; }
        .footer { margin-top: 20px; padding: 20px; background: white; border-radius: 20px; z-index: 2; }
    </style>
</head>
<body>

    <div class="hearts-bg" id="heartsContainer"></div>

    <div class="header">
        <h1>Seni Seviyorum 💕</h1>
        <p id="dynamic-text">Seninle her an bir başka güzel...</p>
    </div>

    <div class="slider-container">
        <div class="gallery-slider" id="slider"></div>
    </div>

    <div class="music-container">
        <p style="text-align: center; font-size: 0.9rem; color: #d63384; margin-bottom: 10px;">Bizim Şarkımız 🎵</p>
        <iframe width="300" height="150" src="https://www.youtube.com/embed/rVMvfs2qPfQ" title="Ajda Pekkan - Sana Doğru" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
    </div>

    <div class="footer">
        💖 İyi ki Varsın Sevgilim 💖
    </div>

    <div class="lightbox" id="lightbox" onclick="this.style.display='none'">
        <img src="" id="lightboxImg">
    </div>

    <script>
        // Hata Düzeltildi: photo8'den sonra virgül eklendi
        const photos = [
            { src: 'photo10.jpg', cap: 'Çocukluğumuz ✨' },
            { src: 'photo11.jpg' , cap: 'İlk Anımız ✨💗'},
            { src: 'photo1.jpg' , cap: ' Anda Kalmak 😊✨💗 '},
            { src: 'photo2.jpg', cap: 'En Güzel Tat 😊' }, 
            { src: 'photo3.jpg', cap: 'Sonsuza Dek 💖' },
            { src: 'photo4.jpg', cap: 'Sadece Sen ✨' },
            { src: 'photo6.jpg', cap: 'Aşkımız... 🌹' },
            { src: 'photo7.jpg', cap: 'Ömrümün Sahibi 🥰' },
            { src: 'photo8.jpg', cap: 'Her Şeyim 💗' },
            { src: 'photo9.jpg', cap: 'Takımımız ✨💗' },
            { src: 'photo70.jpg', cap: 'date mi 🥰' },
            { src: 'photo71.jpg', cap: ' Yoldan Sonra 🥰' },
            { src: 'photo72.jpg', cap: 'Rüya Gibi 💗' },
            { src: 'photo73.jpg', cap: 'Güneşim ✨💗' }
        ];

        const slider = document.getElementById('slider');
        const allPhotos = [...photos, ...photos]; 
        
        allPhotos.forEach(p => {
            const card = document.createElement('div');
            card.className = 'photo-card';
            card.onclick = () => {
                document.getElementById('lightboxImg').src = p.src;
                document.getElementById('lightbox').style.display = 'flex';
            };
            card.innerHTML = `
                <div class="photo-wrapper"><img src="${p.src}" class="photo-img"></div>
                <div class="photo-caption">${p.cap}</div>
            `;
            slider.appendChild(card);
        });

        const messages = [
            "Seninle her an bir mucize...",
            "Kalbimin tek sahibi, iyi ki varsın.",
            "Sana doğru her adımda aşk var...",
            "Yolum seninle hep aydınlık sevgilim.",
            "Dünyanın en güzel gülüşü sende..."
        ];
        let msgIdx = 0;
        setInterval(() => {
            const textEl = document.getElementById('dynamic-text');
            textEl.style.opacity = 0;
            setTimeout(() => {
                msgIdx = (msgIdx + 1) % messages.length;
                textEl.innerText = messages[msgIdx];
                textEl.style.opacity = 1;
            }, 500);
        }, 4000);

        const colors = ['#FFF9C4', '#1A237E', '#F8BBD0'];
        let colorIdx = 0;
        setInterval(() => {
            document.body.style.backgroundColor = colors[colorIdx];
            colorIdx = (colorIdx + 1) % colors.length;
        }, 5000);

        setInterval(() => {
            const container = document.getElementById('heartsContainer');
            const emoji = document.createElement('div');
            emoji.className = 'heart';
            emoji.innerText = ['💕','💖','✨','🌸','🥰'][Math.floor(Math.random()*5)];
            emoji.style.left = Math.random() * 100 + "vw";
            emoji.style.animationDuration = (Math.random() * 2 + 4) + "s";
            container.appendChild(emoji);
            setTimeout(() => emoji.remove(), 6000);
        }, 300);
    </script>
</body>
</html>
